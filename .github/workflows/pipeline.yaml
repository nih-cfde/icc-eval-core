name: Run pipeline

on:
  schedule:
    - cron: "0 12 * * *"

  workflow_dispatch:

env:
  FORCE_COLOR: true

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: SSH debug
        if: runner.debug == '1'
        uses: mxschmitt/action-tmate@v3

      - name: Install packages
        run: ./run.sh --install

      - name: Install Playwright
        run: ./run.sh --install-playwright

      - name: Run pipeline
        run: xvfb-run ./run.sh
        env:
          AUTH_ENTREZ: ${{ secrets.AUTH_ENTREZ }}
          AUTH_GITHUB: ${{ secrets.AUTH_GITHUB }}
          AUTH_GOOGLE: ${{ secrets.AUTH_GOOGLE }}
          CACHE: ${{ inputs.cache && 'true' || '' }}
