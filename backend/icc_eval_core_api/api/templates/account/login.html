{% load socialaccount %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - ICC Eval Core API</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .login-options {
            margin-top: 2rem;
        }
        .orcid-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px 20px;
            background-color: #a6ce39;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .orcid-button:hover {
            background-color: #8fb82c;
        }
        .orcid-icon {
            width: 24px;
            height: 24px;
            margin-right: 10px;
        }
        .info {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f5f5f5;
            border-radius: 4px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>ICC Eval Core API</h1>
        <div class="login-options">
            <a href="{% provider_login_url 'orcid' %}" class="orcid-button">
                <svg class="orcid-icon" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#A6CE39" d="M256 128c0 70.7-57.3 128-128 128S0 198.7 0 128 57.3 0 128 0s128 57.3 128 128z"/>
                    <path fill="#FFF" d="M86.3 186.2H70.9V79.1h15.4v107.1zM108.9 79.1h41.6c39.6 0 57 28.3 57 53.6 0 27.5-21.5 53.6-56.8 53.6h-41.8V79.1zm15.4 93.3h24.5c34.9 0 42.9-26.5 42.9-39.7C191.7 111.2 178 93 148 93h-23.7v79.4zM71.3 54.8c0-5.2 4.2-9.4 9.4-9.4s9.4 4.2 9.4 9.4c0 5.1-4.2 9.4-9.4 9.4s-9.4-4.3-9.4-9.4z"/>
                </svg>
                Login with ORCID
            </a>
        </div>
        <div class="info">
            <p><strong>What is ORCID?</strong></p>
            <p>ORCID provides a persistent digital identifier that distinguishes you from other researchers and supports automated linkages between you and your professional activities.</p>
        </div>
    </div>
</body>
</html>
