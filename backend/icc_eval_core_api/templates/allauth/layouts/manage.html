{% extends "allauth/layouts/base.html" %}
{% block extra_head %}
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    margin: 30px;
}

/* make the ul a flex that shows the menu items side by side */
ul {
    display: flex;
    gap: 20px;
    list-style-type: none;
    padding: 0;
}
ul a { 
    text-decoration: none;
    font-weight: 600;
}

/* make butttons look nicer */
button {
    padding: 10px 20px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    cursor: pointer;
    transition: background-color 0.3s;
}
button:hover {
    background-color: #0056b3;
}
</style>
{% endblock extra_head %}
{% block content %}{% endblock %}
