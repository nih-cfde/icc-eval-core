
volumes:
  pgdata:
  django_static:

services:
  backend:
    build: ./backend/
    volumes:
      - ./data/:/data/
      - django_static:/opt/static/
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:18
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
      - ./db-exports/:/db-exports/
